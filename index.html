<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Interrogator | 最終穩定版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-900 text-white p-4">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_key') || '');
            const [status, setStatus] = useState('準備就緒');
            const [image, setImage] = useState(null);

            const analyze = async () => {
                if (!apiKey) { alert("請輸入 Key"); return; }
                if (!image) { alert("請選圖片"); return; }

                setStatus("分析中...");
                // 使用最經典的視覺模型端點
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.0-pro-vision:generateContent?key=${apiKey}`;
                
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: "請分析此圖片的藝術風格與主體內容，並回傳格式為 JSON: {'summary': '', 'chinese_details': {'subject': '', 'style': '', 'lighting': ''}, 'english_prompts': []}" },
                                    { inlineData: { mimeType: image.type, data: image.data } }
                                ]
                            }]
                        })
                    });

                    const data = await response.json();
                    if (!response.ok) throw new Error(data.error?.message || "請求失敗");
                    
                    const text = data.candidates[0].content.parts[0].text;
                    document.getElementById('result').innerText = text;
                    setStatus("分析完成！");
                } catch (err) {
                    setStatus("失敗: " + err.message);
                }
            };

            return (
                <div className="max-w-xl mx-auto space-y-4">
                    <input type="password" placeholder="API Key" value={apiKey} onChange={(e) => {setApiKey(e.target.value); localStorage.setItem('gemini_key', e.target.value)}} className="w-full p-2 bg-slate-800 text-white rounded"/>
                    <input type="file" onChange={(e) => {
                        const file = e.target.files[0];
                        const reader = new FileReader();
                        reader.onloadend = () => setImage({ data: reader.result.split(',')[1], type: file.type });
                        reader.readAsDataURL(file);
                    }} className="w-full"/>
                    <button onClick={analyze} className="w-full bg-blue-600 p-2 rounded font-bold">{status}</button>
                    <pre id="result" className="bg-black p-4 text-xs overflow-auto h-60"></pre>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
