<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Interrogator - 逆向提示詞專家</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto+Sans+TC', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .prompt-card { animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [apiKey, setApiKey] = useState('');
            const [isConfigOpen, setIsConfigOpen] = useState(true);
            const [selectedImage, setSelectedImage] = useState(null);
            const [imageContent, setImageContent] = useState({ data: null, mimeType: null });
            const [isLoading, setIsLoading] = useState(false);
            const [analysis, setAnalysis] = useState(null);
            const [error, setError] = useState(null);
            const [copied, setCopied] = useState(false);

            useEffect(() => {
                const saved = localStorage.getItem('gemini_prompt_key');
                if (saved) { setApiKey(saved); setIsConfigOpen(false); }
            }, []);

            const handleImage = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setSelectedImage(URL.createObjectURL(file));
                    const reader = new FileReader();
                    reader.onloadend = () => setImageContent({ data: reader.result.split(',')[1], mimeType: file.type });
                    reader.readAsDataURL(file);
                    setError(null);
                    setAnalysis(null);
                }
            };

            const interrogatorImage = async () => {
                if (!apiKey) { setError("請先輸入 API Key"); setIsConfigOpen(true); return; }
                if (!imageContent.data) { setError("請先選取圖片"); return; }

                setIsLoading(true);
                setError(null);
                setAnalysis(null);

                const model = "gemini-1.5-flash";
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

                const systemInstruction = `你是一個專業的 AI 繪圖提示詞逆向工程師 (Prompt Interrogator)。
你的任務是精確分析這張圖，以便在 Midjourney, DALL-E 3 或 Stable Diffusion 中完美重現。
請提供：
1. 繁體中文深度分析：主體細節、藝術風格背景、光影構圖。
2. 英文 Prompt 指令集：分為 'Core Prompt' (核心描述) 與 'Technical Tags' (技術標籤)。
輸出格式必須為 JSON：
{
  "chinese_analysis": { "subject": "主體細節", "style": "風格流派", "lighting": "光影效果" },
  "core_prompt": "完整的核心英文描述詞",
  "tech_tags": ["tag1", "tag2", "8k", "highly detailed"],
  "full_prompt": "將以上組合後最完美的英文提示詞串"
}`;

                const payload = {
                    contents: [{
                        parts: [
                            { text: "請以此圖為基礎，逆向工程生成最專業的 AI 繪圖提示詞。" },
                            { inlineData: { mimeType: imageContent.mimeType, data: imageContent.data } }
                        ]
                    }],
                    systemInstruction: { parts: [{ text: systemInstruction }] },
                    generationConfig: { responseMimeType: "application/json" }
                };

                try {
                    const res = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error?.message || "請求失敗");
                    
                    const raw = data.candidates[0].content.parts[0].text;
                    setAnalysis(JSON.parse(raw));
                } catch (err) {
                    setError(err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            const copyToClip = (text) => {
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="max-w-3xl mx-auto px-6 py-12">
                    {/* Config */}
                    <div className="glass rounded-3xl mb-8 overflow-hidden transition-all border-white/5">
                        <div onClick={() => setIsConfigOpen(!isConfigOpen)} className="p-4 px-6 flex justify-between items-center cursor-pointer hover:bg-white/5">
                            <span className="text-[10px] font-black tracking-widest text-slate-400 uppercase">🛡️ System Configuration</span>
                            <span className="text-xs">{isConfigOpen ? "Close" : "Setup Key"}</span>
                        </div>
                        {isConfigOpen && (
                            <div className="p-6 pt-0">
                                <input 
                                    type="password" placeholder="Gemini API Key..." 
                                    value={apiKey} onChange={(e) => { setApiKey(e.target.value.trim()); localStorage.setItem('gemini_prompt_key', e.target.value.trim()); }}
                                    className="w-full p-4 bg-black/40 border border-white/10 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-mono text-sm"
                                />
                            </div>
                        )}
                    </div>

                    {/* Header */}
                    <header className="text-center mb-16">
                        <div className="w-16 h-16 bg-gradient-to-tr from-indigo-600 to-purple-500 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-[0_0_30px_rgba(79,70,229,0.4)]">
                            <span className="text-3xl">🧩</span>
                        </div>
                        <h1 className="text-4xl font-black tracking-tighter italic text-white uppercase">Prompt Interrogator</h1>
                        <p className="text-slate-500 text-xs font-bold tracking-[0.4em] mt-3 uppercase">AI Art Reverse Engineering</p>
                    </header>

                    {/* Work Area */}
                    <div className="glass rounded-[2.5rem] p-10 mb-10 border-white/5">
                        <div 
                            onClick={() => document.getElementById('up').click()}
                            className={`border-2 border-dashed rounded-[2rem] min-h-[350px] flex items-center justify-center cursor-pointer transition-all ${selectedImage ? 'border-indigo-500/50 bg-indigo-500/5' : 'border-white/10 hover:border-indigo-500/50'}`}
                        >
                            {selectedImage ? <img src={selectedImage} className="max-h-[300px] object-contain rounded-2xl shadow-2xl" /> : <div className="text-slate-500 font-bold tracking-widest text-xs uppercase">Drop Target Image</div>}
                            <input id="up" type="file" className="hidden" onChange={handleImage} />
                        </div>
                        <button 
                            onClick={interrogatorImage} disabled={isLoading || !imageContent.data}
                            className={`w-full mt-10 py-6 rounded-[1.5rem] font-black text-xl transition-all ${isLoading || !imageContent.data ? 'bg-white/5 text-slate-600' : 'bg-white text-black hover:bg-indigo-500 hover:text-white shadow-[0_20px_40px_-10px_rgba(0,0,0,0.5)]'}`}
                        >
                            {isLoading ? "ANALYZING STYLE..." : "逆向生成提示詞"}
                        </button>
                    </div>

                    {error && <div className="p-6 bg-red-500/10 border border-red-500/20 text-red-400 rounded-3xl text-xs font-mono mb-8">{error}</div>}

                    {/* Result */}
                    {analysis && (
                        <div className="space-y-8 prompt-card">
                            <div className="glass rounded-[3rem] overflow-hidden">
                                <div className="p-8 border-b border-white/5 bg-white/5 flex justify-between items-center">
                                    <h2 className="font-black italic text-indigo-400 uppercase tracking-widest text-sm">Visual Intelligence</h2>
                                    <button onClick={() => copyToClip(analysis.full_prompt)} className="px-5 py-2 bg-indigo-600 text-white rounded-xl text-[10px] font-black tracking-widest hover:bg-indigo-500 transition-all uppercase">
                                        {copied ? "Copied" : "Copy Full Prompt"}
                                    </button>
                                </div>
                                <div className="p-10 space-y-10">
                                    <div className="grid md:grid-cols-2 gap-8">
                                        <section className="space-y-4">
                                            <h3 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">中文深度分析</h3>
                                            <div className="text-sm space-y-4 leading-relaxed text-slate-300">
                                                <p><b className="text-white">主體：</b>{analysis.chinese_analysis.subject}</p>
                                                <p><b className="text-white">風格：</b>{analysis.chinese_details?.style || analysis.chinese_analysis.style}</p>
                                                <p><b className="text-white">光影：</b>{analysis.chinese_analysis.lighting}</p>
                                            </div>
                                        </section>
                                        <section className="space-y-4">
                                            <h3 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Technical Tags</h3>
                                            <div className="flex flex-wrap gap-2">
                                                {analysis.tech_tags.map((t, i) => <span key={i} className="px-3 py-1 bg-white/5 rounded-full text-[10px] font-mono text-indigo-300 border border-white/5">{t}</span>)}
                                            </div>
                                        </section>
                                    </div>

                                    <div className="pt-10 border-t border-white/5">
                                        <h3 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Master Prompt</h3>
                                        <div className="bg-black/40 p-8 rounded-[2rem] border border-white/5 mono text-indigo-400 text-sm leading-relaxed shadow-inner select-all">
                                            {analysis.full_prompt}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="mt-24 text-center text-slate-600 text-[10px] font-black tracking-[0.5em] uppercase">
                        AI Prompt Engineering Framework v2.0
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
