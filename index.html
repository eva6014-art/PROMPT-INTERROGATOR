<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prompt Interrogator — 影像逆向工程</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
:root {
  --bg:#0a0a0f;--surface:#111118;--surface2:#18181f;
  --border:rgba(255,255,255,0.07);--border-h:rgba(255,255,255,0.15);
  --accent:#7c6aff;--accent-dim:rgba(124,106,255,0.15);--accent-b:rgba(124,106,255,0.35);
  --text:#f0eff8;--muted:rgba(240,239,248,0.5);--dim:rgba(240,239,248,0.25);
  --ok:#4ade80;--err:#ff6b6b;--err-bg:rgba(255,107,107,0.08);--err-b:rgba(255,107,107,0.2);
  --mono:'DM Mono',monospace;--display:'Syne',sans-serif;--r:12px;--rs:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:14px;line-height:1.6;min-height:100vh}
body::before{content:'';position:fixed;top:-30%;left:-20%;width:60%;height:60%;background:radial-gradient(ellipse,rgba(124,106,255,0.1) 0%,transparent 70%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:-20%;right:-10%;width:50%;height:50%;background:radial-gradient(ellipse,rgba(255,106,176,0.06) 0%,transparent 70%);pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:740px;margin:0 auto;padding:56px 24px 80px}
.eyebrow{font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.eyebrow::before{content:'';width:18px;height:1px;background:var(--accent)}
h1{font-family:var(--display);font-size:clamp(38px,7vw,60px);font-weight:800;line-height:1.04;letter-spacing:-0.03em;background:linear-gradient(135deg,#f0eff8 30%,rgba(240,239,248,0.45));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px}
.subtitle{font-size:14px;color:var(--muted);max-width:480px;line-height:1.7;margin-bottom:48px}
.lbl{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--dim);margin-bottom:8px}
.key-wrap{margin-bottom:36px}
.key-row{display:flex;gap:8px}
.key-row input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:var(--mono);font-size:13px;padding:11px 16px;outline:none;transition:border-color 0.2s}
.key-row input::placeholder{color:var(--dim)}
.key-row input:focus{border-color:var(--accent)}
.btn-sm{background:var(--accent-dim);border:1px solid var(--accent-b);border-radius:var(--rs);color:var(--accent);font-family:var(--mono);font-size:12px;padding:0 18px;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.btn-sm:hover{background:rgba(124,106,255,0.25)}
.key-hint{margin-top:8px;font-size:11px;color:var(--dim)}
.key-hint a{color:var(--accent);text-decoration:none}
.key-hint a:hover{text-decoration:underline}
#key-status{font-size:12px;margin-top:6px}
.drop-wrap{margin-bottom:32px}
.dropzone{border:1px dashed var(--border-h);border-radius:var(--r);padding:44px 24px;text-align:center;cursor:pointer;background:var(--surface);transition:all 0.2s;position:relative;overflow:hidden}
.dropzone::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(124,106,255,0.07) 0%,transparent 70%);opacity:0;transition:opacity 0.2s}
.dropzone:hover::before,.dropzone.drag::before{opacity:1}
.dropzone:hover,.dropzone.drag{border-color:var(--accent);border-style:solid}
.dz-icon{width:46px;height:46px;margin:0 auto 14px;border-radius:11px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center}
.dz-icon svg{width:20px;height:20px;stroke:var(--accent);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.dropzone p{color:var(--muted);font-size:14px}
.dropzone .sub{font-size:11px;color:var(--dim);margin-top:4px}
input[type=file]{display:none}
#preview-area{display:none;margin-bottom:32px}
.preview-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;display:flex;gap:16px;align-items:flex-start}
.preview-card img{width:90px;height:90px;object-fit:cover;border-radius:var(--rs);border:1px solid var(--border);flex-shrink:0}
.preview-name{font-size:13px;color:var(--text);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:400px}
.preview-size{font-size:11px;color:var(--dim);margin-bottom:10px}
.btn-rm{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:var(--mono);font-size:11px;padding:4px 11px;cursor:pointer;transition:all 0.2s}
.btn-rm:hover{border-color:var(--err);color:var(--err)}
.btn-analyze{width:100%;padding:15px;background:linear-gradient(135deg,var(--accent) 0%,#9b6aff 100%);border:none;border-radius:var(--r);color:#fff;font-family:var(--display);font-size:16px;font-weight:700;letter-spacing:0.02em;cursor:pointer;transition:all 0.2s;margin-bottom:22px}
.btn-analyze:hover{opacity:0.9}
.btn-analyze:active{transform:scale(0.99)}
.btn-analyze:disabled{opacity:0.38;cursor:not-allowed;transform:none}
#status{margin-bottom:14px;min-height:20px}
.s-load{font-size:12px;color:var(--accent);display:flex;align-items:center;gap:8px}
.spin{width:13px;height:13px;border:1.5px solid rgba(124,106,255,0.3);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.s-err{font-size:12px;color:var(--err);background:var(--err-bg);border:1px solid var(--err-b);border-radius:var(--rs);padding:10px 14px;line-height:1.6;white-space:pre-wrap}
#results{display:none;animation:up 0.35s ease}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.res-hd{display:flex;align-items:center;gap:8px;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.res-hd span{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--dim)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-bottom:10px;transition:border-color 0.2s}
.card:hover{border-color:var(--border-h)}
.card-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.card-lbl{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--dim)}
.btn-copy{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:var(--mono);font-size:11px;padding:3px 11px;cursor:pointer;transition:all 0.2s}
.btn-copy:hover{border-color:var(--accent);color:var(--accent)}
.pt{font-family:var(--mono);font-size:13px;color:var(--text);line-height:1.8;word-break:break-word}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-family:var(--mono);font-size:11px;padding:4px 11px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);color:var(--muted)}
.chip.hi{background:var(--accent-dim);border-color:var(--accent-b);color:rgba(190,180,255,0.9)}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:480px){.igrid{grid-template-columns:1fr}}
.ilbl{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim);margin-bottom:3px}
.ival{font-size:13px;color:var(--text);line-height:1.5}
footer{margin-top:60px;padding-top:20px;border-top:1px solid var(--border);text-align:center;font-size:11px;color:var(--dim);letter-spacing:0.04em}
footer a{color:var(--accent);text-decoration:none}
footer a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Visual Reverse Engineering</div>
  <h1>Prompt<br>Interrogator</h1>
  <p class="subtitle">上傳任意圖片，自動逆向分析並輸出可直接用於 AI 生圖的完整咒語（英文 + 繁中雙語）。</p>

  <div class="key-wrap">
    <div class="lbl">Gemini API Key</div>
    <div class="key-row">
      <input type="password" id="api-key" placeholder="AIza..." autocomplete="off" />
      <button class="btn-sm" onclick="saveKey()">儲存</button>
    </div>
    <div id="key-status"></div>
    <div class="key-hint">免費取得：<a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">aistudio.google.com</a> — Key 只存在你的瀏覽器</div>
  </div>

  <div class="drop-wrap">
    <div class="lbl">圖片</div>
    <div id="dropzone" class="dropzone"
      onclick="document.getElementById('fi').click()"
      ondragover="onDO(event)" ondragleave="onDL()" ondrop="onDP(event)">
      <div class="dz-icon">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </div>
      <p>點擊上傳或拖放圖片</p>
      <p class="sub">PNG · JPG · WEBP · GIF — max 5 MB</p>
      <input type="file" id="fi" accept="image/*" onchange="onFS(event)" />
    </div>
  </div>

  <div id="preview-area">
    <div class="preview-card">
      <img id="prev-img" src="" alt="preview" />
      <div style="flex:1;min-width:0">
        <div class="preview-name" id="fn"></div>
        <div class="preview-size" id="fs"></div>
        <button class="btn-rm" onclick="clearImg()">✕ 移除</button>
      </div>
    </div>
  </div>

  <button class="btn-analyze" id="go-btn" onclick="analyze()">分析影像 →</button>
  <div id="status"></div>
  <div id="results"></div>

  <footer>Prompt Interrogator &mdash; powered by <a href="https://aistudio.google.com" target="_blank" rel="noopener">Gemini</a>. Key 永遠不離開您的瀏覽器。</footer>
</div>
<script>
let b64=null,mime=null,key='';

window.addEventListener('DOMContentLoaded',()=>{
  const k=localStorage.getItem('gk');
  if(k){key=k;document.getElementById('api-key').value=k;ks('✓ 已載入','ok');}
});

function saveKey(){
  const k=document.getElementById('api-key').value.trim();
  if(!k){ks('⚠ 請輸入 Key','err');return;}
  key=k;localStorage.setItem('gk',k);ks('✓ 已儲存','ok');
}
function ks(m,t){
  const el=document.getElementById('key-status');
  el.textContent=m;el.style.color=t==='ok'?'var(--ok)':'var(--err)';
}

function onDO(e){e.preventDefault();document.getElementById('dropzone').classList.add('drag');}
function onDL(){document.getElementById('dropzone').classList.remove('drag');}
function onDP(e){e.preventDefault();onDL();const f=e.dataTransfer.files[0];if(f)load(f);}
function onFS(e){if(e.target.files[0])load(e.target.files[0]);}

function load(file){
  if(file.size>5*1024*1024){alert('檔案過大（最大 5MB）');return;}
  const r=new FileReader();
  r.onload=e=>{
    b64=e.target.result.split(',')[1];mime=file.type;
    document.getElementById('prev-img').src=e.target.result;
    document.getElementById('fn').textContent=file.name;
    document.getElementById('fs').textContent=(file.size/1024).toFixed(0)+' KB';
    document.getElementById('dropzone').style.display='none';
    document.getElementById('preview-area').style.display='block';
    document.getElementById('results').style.display='none';
    document.getElementById('results').innerHTML='';
    st('');
  };
  r.readAsDataURL(file);
}

function clearImg(){
  b64=null;mime=null;
  document.getElementById('dropzone').style.display='block';
  document.getElementById('preview-area').style.display='none';
  document.getElementById('results').style.display='none';
  document.getElementById('fi').value='';st('');
}

function st(m,t){
  const el=document.getElementById('status');
  if(!m){el.innerHTML='';return;}
  if(t==='load')el.innerHTML='<div class="s-load"><div class="spin"></div>'+esc(m)+'</div>';
  else if(t==='err')el.innerHTML='<div class="s-err">'+esc(m)+'</div>';
  else el.textContent=m;
}

function prompt_text(){
  return `You are a professional AI image prompt engineer. Analyze this image carefully.

Return ONLY a valid JSON object. No markdown. No explanation. No code fences. Start with { end with }.

Required JSON structure:
{
  "prompt_en": "Write a complete Stable Diffusion / Midjourney prompt. Include: detailed subject, art style, artist name if recognizable, lighting type, color palette description, composition, camera angle, quality tags like (masterpiece, best quality, highly detailed, 8k, ultra-realistic). This must be copy-paste ready for AI image generators.",
  "prompt_zh": "完整繁體中文生圖咒語，包含：主體描述、畫風、藝術家參考、光線、色調、構圖、品質關鍵詞。可直接貼到 AI 生圖工具使用。",
  "negative_prompt_en": "List of what to avoid: ugly, deformed, blurry, bad anatomy, extra limbs, watermark, signature, low quality, worst quality, jpeg artifacts, text",
  "negative_prompt_zh": "負面提示詞中文版：醜陋、變形、模糊、解剖錯誤、多餘肢體、浮水印、簽名、低品質",
  "style_tags": ["style tag 1", "style tag 2", "style tag 3", "style tag 4", "style tag 5"],
  "artist_reference": "Specific artist name or style / 藝術家或風格名稱",
  "art_movement": "Art movement name / 藝術流派",
  "mood": "Mood and atmosphere / 氛圍情緒",
  "technical_medium": "Medium like digital painting, oil painting, etc / 媒材",
  "color_palette": ["warm amber tones", "cool blue shadows", "vivid accent colors"],
  "recommended_model": "Best AI model for this style e.g. Stable Diffusion XL / Midjourney v6 / DALL-E 3",
  "composition_notes": "Composition and framing analysis / 構圖分析"
}`;
}

async function analyze(){
  if(!key){st('請先儲存 Gemini API Key。','err');return;}
  if(!b64){st('請先上傳圖片。','err');return;}
  st('Gemini 分析中，請稍候...','load');
  document.getElementById('go-btn').disabled=true;
  document.getElementById('results').style.display='none';

  // Try key in URL (more compatible with free tier) and header both
  const models=['gemini-1.5-flash','gemini-1.5-pro','gemini-2.5-flash','gemini-1.5-flash-001'];
  const errors=[];

  for(const model of models){
    st('嘗試模型 '+model+'...','load');
    try{
      const url='https://generativelanguage.googleapis.com/v1beta/models/'+model+':generateContent?key='+encodeURIComponent(key);
      const res=await fetch(url,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          contents:[{parts:[
            {inline_data:{mime_type:mime,data:b64}},
            {text:prompt_text()}
          ]}],
          generationConfig:{temperature:0.2,maxOutputTokens:2000}
        })
      });
      const data=await res.json();
      if(!res.ok){
        const msg=data?.error?.message||'HTTP '+res.status;
        errors.push('['+model+'] '+res.status+': '+msg);
        if(res.status===400&&msg.includes('API_KEY'))throw new Error('STOP:API Key 無效 — 請重新確認 Key 是否正確完整');
        if(res.status===403)throw new Error('STOP:Permission denied (403) — Key 無存取此 API 的權限');
        if(res.status===429)throw new Error('STOP:Rate limit (429) — 請等 1 分鐘後再試');
        continue;
      }
      const raw=data?.candidates?.[0]?.content?.parts?.[0]?.text||'';
      if(!raw){errors.push('['+model+'] 回傳空白');continue;}
      const json=parseJ(raw);
      if(!json){errors.push('['+model+'] JSON 解析失敗: '+raw.slice(0,100));continue;}
      render(json,model);st('');
      document.getElementById('go-btn').disabled=false;
      return;
    }catch(e){
      if(e.message.startsWith('STOP:')){
        st(e.message.slice(5),'err');
        document.getElementById('go-btn').disabled=false;return;
      }
      errors.push('['+model+'] '+e.message);
    }
  }
  st('所有模型都失敗，詳細錯誤：\n'+errors.join('\n'),'err');
  document.getElementById('go-btn').disabled=false;
}

function parseJ(raw){
  let s=raw.replace(/^```[a-zA-Z]*\s*/gm,'').replace(/```\s*$/gm,'').trim();
  try{return JSON.parse(s);}catch(_){}
  const m=s.match(/\{[\s\S]*\}/);
  if(!m)return null;
  try{return JSON.parse(m[0]);}catch(_){}
  try{return JSON.parse(m[0].replace(/,\s*([}\]])/g,'$1'));}catch(_){}
  return null;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}

function cpBtn(text){return '<button class="btn-copy" onclick="cp(this,'+JSON.stringify(text)+')">複製</button>';}
function cp(btn,t){navigator.clipboard.writeText(t).then(()=>{btn.textContent='已複製!';setTimeout(()=>btn.textContent='複製',1500);});}

function card(lbl,inner,ctext){
  return '<div class="card"><div class="card-hd"><span class="card-lbl">'+lbl+'</span>'+(ctext?cpBtn(ctext):'')+'</div>'+inner+'</div>';
}

function render(j,model){
  const el=document.getElementById('results');
  let html='<div class="res-hd"><div class="dot"></div><span>分析完成 — '+esc(model)+'</span></div>';

  if(j.prompt_en)
    html+=card('🎨 AI 生圖咒語 — English','<div class="pt">'+esc(j.prompt_en)+'</div>',j.prompt_en);
  if(j.prompt_zh)
    html+=card('🎨 AI 生圖咒語 — 繁體中文','<div class="pt">'+esc(j.prompt_zh)+'</div>',j.prompt_zh);

  if(j.negative_prompt_en||j.negative_prompt_zh){
    const neg=[j.negative_prompt_en,j.negative_prompt_zh].filter(Boolean).join('\n');
    html+=card('🚫 負面提示詞 Negative Prompt','<div class="pt" style="color:var(--muted)">'+esc(neg)+'</div>',neg);
  }

  const fields=[];
  if(j.artist_reference)fields.push(['藝術家參考',j.artist_reference]);
  if(j.art_movement)fields.push(['藝術風格',j.art_movement]);
  if(j.mood)fields.push(['氛圍',j.mood]);
  if(j.technical_medium)fields.push(['媒材',j.technical_medium]);
  if(j.recommended_model)fields.push(['推薦生圖模型',j.recommended_model]);
  if(j.composition_notes)fields.push(['構圖分析',j.composition_notes]);
  if(fields.length){
    const g=fields.map(([l,v])=>'<div><div class="ilbl">'+l+'</div><div class="ival">'+esc(v)+'</div></div>').join('');
    html+=card('📊 風格分析','<div class="igrid">'+g+'</div>');
  }

  if(j.color_palette?.length){
    const sw=j.color_palette.map(c=>'<span class="chip">'+esc(c)+'</span>').join('');
    html+=card('🎨 色盤','<div class="chips">'+sw+'</div>');
  }
  if(j.style_tags?.length){
    const tg=j.style_tags.map(t=>'<span class="chip hi">'+esc(t)+'</span>').join('');
    html+=card('🏷️ 風格標籤','<div class="chips">'+tg+'</div>');
  }

  el.innerHTML=html;el.style.display='block';
}
</script>
</body>
</html>
