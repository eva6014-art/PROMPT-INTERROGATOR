<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Interrogator | 專業影像逆向工程</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #020617; 
            color: #f8fafc; 
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .gradient-text {
            background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_interrogator_key') || '');
            const [isConfigOpen, setIsConfigOpen] = useState(!apiKey);
            const [selectedImage, setSelectedImage] = useState(null);
            const [imageContent, setImageContent] = useState({ data: null, mimeType: null });
            const [isLoading, setIsLoading] = useState(false);
            const [analysis, setAnalysis] = useState(null);
            const [error, setError] = useState(null);
            const [copied, setCopied] = useState(false);

            const handleImage = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setSelectedImage(URL.createObjectURL(file));
                    const reader = new FileReader();
                    reader.onloadend = () => setImageContent({ data: reader.result.split(',')[1], mimeType: file.type });
                    reader.readAsDataURL(file);
                    setError(null);
                    setAnalysis(null);
                }
            };

            const runAnalysis = async () => {
                if (!apiKey) { setError("請先輸入 API Key"); setIsConfigOpen(true); return; }
                if (!imageContent.data) { setError("請上傳圖片"); return; }

                setIsLoading(true);
                setError(null);
                setAnalysis(null);

                // 強制使用 1.5 Flash，並確保 URL 格式正確
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

                const promptText = `你是一個專業的 AI 繪圖提示詞逆向工程師。請深度分析此圖片，並回傳可在 Midjourney 或 DALL-E 3 中重現此風格的專業提示詞。
回傳格式必須是 JSON 如下：
{
  "summary": "一句話描述主題",
  "chinese_details": { "subject": "主體細節描述", "style": "藝術風格描述", "lighting": "照明與構圖描述" },
  "tech_tags": ["標籤1", "標籤2"],
  "full_prompt": "一段精煉且專業的英文繪圖指令"
}`;

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: promptText },
                                    { inlineData: { mimeType: imageContent.mimeType, data: imageContent.data } }
                                ]
                            }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    const data = await response.json();
                    if (!response.ok) throw new Error(data.error?.message || "請求失敗");

                    const rawText = data.candidates[0].content.parts[0].text;
                    const jsonMatch = rawText.match(/\{[\s\S]*\}/);
                    if (!jsonMatch) throw new Error("AI 回傳格式錯誤");
                    
                    setAnalysis(JSON.parse(jsonMatch[0]));
                } catch (err) {
                    setError(err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            const copyToClip = (text) => {
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="max-w-3xl mx-auto py-12 px-4">
                    {/* 設定欄 */}
                    <div className="glass rounded-3xl mb-8 p-6 shadow-2xl">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-[10px] font-black uppercase tracking-widest text-slate-500">API Configuration</h2>
                            <button onClick={() => setIsConfigOpen(!isConfigOpen)} className="text-xs text-indigo-400">
                                {isConfigOpen ? "收起" : "修改 Key"}
                            </button>
                        </div>
                        {isConfigOpen && (
                            <input 
                                type="password" 
                                placeholder="在此輸入 Gemini API Key" 
                                value={apiKey} 
                                onChange={(e) => {setApiKey(e.target.value); localStorage.setItem('gemini_interrogator_key', e.target.value)}}
                                className="w-full bg-black/40 border border-white/10 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-mono text-sm"
                            />
                        )}
                    </div>

                    {/* 標題 */}
                    <header className="text-center mb-16">
                        <div className="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-2xl shadow-indigo-500/20 text-3xl">🧩</div>
                        <h1 className="text-4xl font-black italic tracking-tighter uppercase mb-2">Prompt <span className="gradient-text">Interrogator</span></h1>
                        <p className="text-slate-500 text-[10px] font-bold tracking-[0.4em] uppercase">Visual Reverse Engineering Lab</p>
                    </header>

                    {/* 上傳區 */}
                    <div className="glass rounded-[2.5rem] p-8 md:p-12 mb-8 shadow-2xl">
                        <div 
                            onClick={() => document.getElementById('up').click()}
                            className={`border-2 border-dashed rounded-[2rem] min-h-[300px] flex flex-col items-center justify-center cursor-pointer transition-all ${selectedImage ? 'border-indigo-500/50 bg-indigo-500/5' : 'border-white/10 hover:bg-white/5'}`}
                        >
                            {selectedImage ? (
                                <img src={selectedImage} className="max-h-[260px] rounded-xl object-contain shadow-2xl" />
                            ) : (
                                <div className="text-slate-500 text-center">
                                    <p className="text-4xl mb-4">📸</p>
                                    <p className="font-bold uppercase tracking-widest text-xs">Select Image</p>
                                </div>
                            )}
                            <input id="up" type="file" className="hidden" accept="image/*" onChange={handleImage} />
                        </div>
                        <button 
                            onClick={runAnalysis}
                            disabled={isLoading || !imageContent.data}
                            className={`w-full mt-10 py-6 rounded-3xl font-black text-xl transition-all ${isLoading || !imageContent.data ? 'bg-white/5 text-slate-600' : 'bg-white text-black hover:bg-indigo-600 hover:text-white shadow-xl'}`}
                        >
                            {isLoading ? "Analyzing..." : "逆向生成提示詞"}
                        </button>
                    </div>

                    {error && <div className="p-6 bg-red-900/20 border border-red-500/20 text-red-400 rounded-3xl text-xs font-mono mb-8">{error}</div>}

                    {/* 結果區 */}
                    {analysis && (
                        <div className="glass rounded-[3rem] overflow-hidden result-card shadow-2xl">
                            <div className="p-8 border-b border-white/5 bg-white/5 flex justify-between items-center">
                                <h2 className="font-black italic text-indigo-400 tracking-widest text-sm uppercase">Analysis Data</h2>
                                <button onClick={() => copyToClip(analysis.full_prompt)} className="px-5 py-2 bg-indigo-600 text-white rounded-xl text-[10px] font-black uppercase tracking-widest">
                                    {copied ? "已複製" : "複製 Prompt"}
                                </button>
                            </div>
                            <div className="p-10 space-y-12">
                                <p className="text-slate-100 font-bold text-2xl leading-tight italic tracking-tight">{analysis.summary}</p>
                                <div className="grid md:grid-cols-2 gap-12 text-sm">
                                    <section className="space-y-6">
                                        <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4 italic">Detail Report</h3>
                                        <div className="space-y-4">
                                            <p><b className="text-indigo-400 block mb-1">主體：</b>{analysis.chinese_details.subject}</p>
                                            <p><b className="text-indigo-400 block mb-1">風格：</b>{analysis.chinese_details.style}</p>
                                        </div>
                                    </section>
                                    <section className="space-y-6">
                                        <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4 italic">Tags & Engine</h3>
                                        <div className="flex flex-wrap gap-2 mb-4">
                                            {analysis.tech_tags.map((t, i) => <span key={i} className="px-3 py-1 bg-white/5 rounded-full text-[10px] mono border border-white/10">{t}</span>)}
                                        </div>
                                        <div className="bg-black/40 p-6 rounded-2xl border border-white/5 mono text-indigo-300 text-xs leading-relaxed">
                                            {analysis.full_prompt}
                                        </div>
                                    </section>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
